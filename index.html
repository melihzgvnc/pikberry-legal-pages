<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikberry — AI Mock Interview Practice</title>
  <style>
    :root {
      --brand: #8c1732;
      --text: #1f2937;
      --muted: #6b7280;
      --bg: #ffffff;
      --surface: #f9fafb;
      --border: #e5e7eb;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      text-align: center;
      padding: .75rem;
      font-size: .9rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    nav a { margin: 0 .75rem; text-decoration: none; font-weight: 500; color: var(--brand); }
    nav a:hover { text-decoration: underline; }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .hero { text-align: center; max-width: 520px; }
    .hero h1 { font-size: 2rem; font-weight: 700; color: var(--brand); }
    .hero p { margin-top: .75rem; font-size: 1.05rem; color: var(--muted); }
    .links { margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .links a {
      display: inline-block;
      padding: .65rem 1.5rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: .95rem;
      text-decoration: none;
      transition: opacity .15s;
    }
    .links a:hover { opacity: .85; }
    .links .primary { background: var(--brand); color: #fff; }
    .links .secondary { border: 1px solid var(--border); color: var(--text); }
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: .85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <nav><a href="privacy.html">Privacy Policy</a><a href="terms.html">Terms of Use</a><a href="support.html">Support</a></nav>
  <main>
    <div class="hero">
      <h1>Pikberry</h1>
      <p>Practice interviews with AI-powered feedback. Build confidence and land the job.</p>
      <div class="links">
        <a href="privacy.html" class="secondary">Privacy Policy</a>
        <a href="terms.html" class="secondary">Terms of Use</a>
        <a href="support.html" class="primary">Support</a>
      </div>
    </div>
  </main>
  <footer>&copy; 2026 Pikberry. All rights reserved.</footer>
</body>
</html>
